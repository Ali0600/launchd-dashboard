# Automated dependency updates. Minor/patch bumps are grouped into one PR per
# ecosystem to limit noise; majors still arrive as individual PRs for review.
version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    groups:
      pip-minor-patch:
        patterns: ['*']
        update-types: ['minor', 'patch']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ['*']
