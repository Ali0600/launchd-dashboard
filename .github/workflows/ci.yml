name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: jobs only read the repo.
permissions:
  contents: read

# A newer push to the same ref cancels the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint + test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      # The suite is fixture-only (pure parsers, no live launchctl/lsof), so it
      # runs fine on Linux even though the tool itself targets macOS.
      - run: ruff check .
      - run: pytest -q
